name: Dnevno azuriranje cijene goriva

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Dohvati i izracunaj cijenu
        run: node scripts/update_fuel.mjs
      - name: Spremi promjenu (ako je ima)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fuel-price.json
          git diff --staged --quiet || git commit -m "Auto: cijena goriva"
          git push
